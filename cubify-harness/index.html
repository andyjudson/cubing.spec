<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cubify-harness</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="./css/cubify.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px 16px 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      gap: 8px;
    }

    /* ---- Main area: cube + tabbed panel ---- */
    .main-area {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* Cube column */
    .cube-col {
      display: flex;
      flex-direction: column;
      width: 400px;
      flex-shrink: 0;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0d0d1a;
      overflow: hidden;
    }

    .cube-col .tabs { flex-shrink: 0; margin: 0; padding: 6px 8px 0; }
    .cube-col .tabs ul { border-bottom-color: #333; }
    .cube-col .tabs li a { color: #888; border-bottom-color: #333; padding: 2px 10px; font-size: 0.72rem; }
    .cube-col .tabs li.is-active a { color: #fff; border-bottom-color: #4a90d9; }

    .cube-tab-panel { display: none; }
    .cube-tab-panel.is-active { display: block; }

    #cube-container {
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      overflow: hidden;
    }
    #cube-container canvas { display: block; width: 100% !important; height: 100% !important; }

    #cube-2d {
      width: 75%;
      aspect-ratio: 1;
      background: #000;
      margin: 0 auto;
    }
    #cube-2d canvas { display: block; width: 100% !important; height: 100% !important; }

    /* Right panel: tabbed (Simulation | Moves | Stickering) */
    .right-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      border: 1px solid #333;
      border-radius: 8px;
      background: #0d0d1a;
      overflow: hidden;
    }

    .right-panel .tabs { flex-shrink: 0; margin: 0; padding: 6px 8px 0; }
    .right-panel .tabs ul { border-bottom-color: #333; }
    .right-panel .tabs li a { color: #888; border-bottom-color: #333; padding: 2px 10px; font-size: 0.72rem; }
    .right-panel .tabs li.is-active a { color: #fff; border-bottom-color: #4a90d9; }

    .tools-panel { display: none; flex: 1; flex-direction: column; padding: 8px; overflow-y: auto; gap: 8px; }
    .tools-panel.is-active { display: flex; }

    .control-group { display: flex; flex-direction: column; gap: 4px; }
    .control-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
    }
    .btn-row { display: flex; gap: 4px; flex-wrap: wrap; }
    .alg-label {
      font-size: 0.72rem;
      color: #888;
      font-family: monospace;
      min-height: 1.1em;
    }

    .validator-row { flex-shrink: 0; display: flex; gap: 4px; }
    .validator-row .button { flex: 1; min-width: 0; }
    .validator-input-row { flex-shrink: 0; display: flex; gap: 6px; }
    #move-status { flex-shrink: 0; font-size: 0.72rem; font-family: monospace; color: #666; }
    #orbit-status { font-size: 0.72rem; font-family: monospace; color: #666; }

    /* ---- Debug panel — flex child at bottom ---- */
    .debug-panel {
      height: 160px;
      flex-shrink: 0;
      background: #0d0d1a;
      border-top: 1px solid #333;
      margin: 0 -16px;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
    }

    /* Bulma tabs overrides for dark panel */
    .debug-panel .tabs { flex-shrink: 0; margin-bottom: 6px; }
    .debug-panel .tabs ul { border-bottom-color: #333; }
    .debug-panel .tabs li a { color: #888; border-bottom-color: #333; padding: 2px 10px; font-size: 0.72rem; }
    .debug-panel .tabs li.is-active a { color: #fff; border-bottom-color: #4a90d9; }

    .debug-tab-panel { display: none; min-height: 0; }
    #debug-log-panel.is-active   { display: flex; flex-direction: column; }
    #debug-state-panel.is-active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }

    #debug-pre, #face-state-pre, #kpattern-corners-pre, #kpattern-edges-pre, #kpattern-centers-pre {
      flex: 1; overflow-y: auto; min-height: 0;
      background: #222; border: 1px solid #444; border-radius: 4px; padding: 6px 8px;
    }
    #debug-pre            { font-family: monospace; font-size: 0.75rem; color: #7fc; white-space: pre; overflow-x: auto; line-height: 1.5; }
    #face-state-pre       { font-family: monospace; font-size: 0.75rem; color: #adf; white-space: pre;      line-height: 1.5; }
    #kpattern-corners-pre { font-family: monospace; font-size: 0.75rem; color: #fc9; white-space: pre;      line-height: 1.5; }
    #kpattern-edges-pre   { font-family: monospace; font-size: 0.75rem; color: #fc9; white-space: pre;      line-height: 1.5; }
    #kpattern-centers-pre { font-family: monospace; font-size: 0.75rem; color: #fc9; white-space: pre;      line-height: 1.5; }

    /* Bulma button size/colour tweaks for dark bg */
    .button.is-harness {
      background: #222;
      border-color: #444;
      color: #ccc;
      font-size: 0.78rem;
    }
    .button.is-harness:hover { background: #2a2a2a; color: #fff; }
    .button.is-harness.is-active,
    .button.is-harness.is-info { background: #2d5af5; border-color: #2d5af5; color: #fff; }
    .button.is-harness:disabled { opacity: 0.35; }
    .button.is-harness .material-icons { font-size: 1rem; vertical-align: middle; line-height: 1; margin-right: 3px; }
    #move-tape { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 3px; margin-top: 4px; padding-bottom: 2px; min-height: 0; }
    #move-tape:empty { display: none; }
    .move-chip { flex-shrink: 0; font-family: monospace; font-size: 0.72rem; padding: 1px 5px; border-radius: 3px; background: #222; border: 1px solid #444; color: #888; }
    .move-chip.is-active { background: #2d5af5; border-color: #2d5af5; color: #fff; }
    .move-chip.is-done   { color: #ccc; border-color: #555; }
  </style>
</head>
<body>

<p class="has-text-weight-semibold" style="font-size:1rem;color:#fff;flex-shrink:0;margin:0">cubify-harness</p>

<div class="main-area">

  <!-- Cube panel -->
  <div class="cube-col">
    <div class="tabs">
      <ul>
        <li id="cube-tab-3d" class="is-active"><a onclick="showCubeTab('3d')">3D</a></li>
        <li id="cube-tab-2d"><a onclick="showCubeTab('2d')">2D</a></li>
      </ul>
    </div>
    <div id="cube-3d-panel" class="cube-tab-panel is-active">
      <div id="cube-container"></div>
    </div>
    <div id="cube-2d-panel" class="cube-tab-panel">
      <div id="cube-2d"></div>
    </div>
  </div>

  <!-- Right panel: Simulation | Moves | Stickering -->
  <div class="right-panel">
    <div class="tabs">
      <ul>
        <li id="tool-tab-simulation" class="is-active"><a onclick="showToolsTab('simulation')">Simulation</a></li>
        <li id="tool-tab-moves"><a onclick="showToolsTab('moves')">Moves</a></li>
        <li id="tool-tab-stickering"><a onclick="showToolsTab('stickering')">Stickering</a></li>
      </ul>
    </div>

    <!-- Simulation panel -->
    <div id="tools-simulation-panel" class="tools-panel is-active">

      <div class="control-group">
        <span class="control-label">Algorithm</span>
        <div class="btn-row" id="alg-buttons"></div>
        <span class="control-label" style="margin-top:4px">Move tape</span>
        <div class="btn-row">
          <button id="btn-prev" class="button is-harness is-small"><span class="material-icons">navigate_before</span>Prev</button>
          <button id="btn-next" class="button is-harness is-small"><span class="material-icons">navigate_next</span>Next</button>
        </div>
        <div id="move-tape"></div>
      </div>

      <div class="control-group">
        <span class="control-label">Playback</span>
        <div class="btn-row">
          <button id="btn-play" class="button is-harness is-small">&#9654; Play</button>
          <button id="btn-stop" class="button is-harness is-small" disabled>&#9632; Stop</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Speed</span>
        <div class="btn-row">
          <button class="button is-harness is-small" data-speed="500"><span class="material-icons">remove_circle</span>Slow</button>
          <button class="button is-harness is-small is-active" data-speed="300"><span class="material-icons">slow_motion_video</span>Normal</button>
          <button class="button is-harness is-small" data-speed="120"><span class="material-icons">add_circle</span>Fast</button>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">Actions</span>
        <div class="btn-row">
          <button id="btn-reset" class="button is-harness is-small"><span class="material-icons">restart_alt</span>Reset case</button>
          <button id="btn-solved" class="button is-harness is-small"><span class="material-icons">grid_on</span>Solved</button>
          <button id="btn-cam-reset" class="button is-harness is-small"><span class="material-icons">filter_center_focus</span>Reset view</button>
          <button id="btn-export-2d" class="button is-harness is-small"><span class="material-icons">download</span>Export 2D</button>
          <button id="btn-export-3d" class="button is-harness is-small"><span class="material-icons">download</span>Export 3D</button>
          <a id="btn-download-log" class="button is-harness is-small" download="cubify-debug.json" href="#"><span class="material-icons">download</span>Log</a>
        </div>
      </div>

    </div>

    <!-- Moves panel -->
    <div id="tools-moves-panel" class="tools-panel">
      <div class="validator-row" id="move-buttons-face"></div>
      <div class="validator-row" id="move-buttons-other"></div>
      <div class="validator-input-row">
        <input id="move-input" class="input is-small" type="text"
               placeholder="e.g. R U R' U'"
               style="font-family:monospace;background:#111827;border-color:#444;color:#ddd;flex:1;min-width:0;" />
        <button id="btn-move-apply" class="button is-harness is-small">Apply</button>
        <button id="btn-move-reset" class="button is-harness is-small">Reset</button>
      </div>
      <div id="move-status"></div>
    </div>

    <!-- Stickering panel -->
    <div id="tools-stickering-panel" class="tools-panel">
      <div class="validator-row" id="orbit-examples-basic"></div>
      <div class="validator-row" id="orbit-examples-oll"></div>
      <div class="validator-row" id="orbit-examples-pll"></div>
      <div class="validator-input-row">
        <input id="orbit-input" class="input is-small" type="text"
               placeholder="e.g. EDGES:------------,CORNERS:--------,CENTERS:------"
               style="font-family:monospace;font-size:0.75rem;background:#111827;border-color:#444;color:#ddf;flex:1;min-width:0;" />
        <button id="btn-orbit-apply" class="button is-harness is-small">Apply</button>
        <button id="btn-orbit-clear" class="button is-harness is-small">Reset</button>
      </div>
      <div id="orbit-status"></div>
    </div>

  </div>

</div>

<!-- Debug panel -->
<div class="debug-panel">
  <div class="tabs">
    <ul>
      <li id="tab-log" class="is-active"><a onclick="showTab('log')">Event log</a></li>
      <li id="tab-state"><a onclick="showTab('state')">State</a></li>
    </ul>
  </div>

  <div id="debug-log-panel" class="debug-tab-panel is-active">
    <pre id="debug-pre"></pre>
  </div>

  <div id="debug-state-panel" class="debug-tab-panel">
    <pre id="face-state-pre"></pre>
    <pre id="kpattern-corners-pre"></pre>
    <pre id="kpattern-edges-pre"></pre>
    <pre id="kpattern-centers-pre"></pre>
  </div>
</div>

<script type="module">
  import { CubeState } from './src/CubeState.js';
  import { AlgParser } from './src/AlgParser.js';
  import { CubeRenderer3D } from './src/CubeRenderer3D.js';
  import { CubeRenderer2D } from './src/CubeRenderer2D.js';
  import { CubeStickering, MASK_PRESETS } from './src/CubeStickering.js';

  // Warm up kpuzzle early (cached after first call)
  const _solvedBase = await CubeState.solved();

  // ---- Named algorithms ----
  // caseAlg: true  → start from case state (inverse alg applied to solved), stepping solves it
  // caseAlg: false → start from solved, stepping executes the alg
  const ALGS = [
    { label: 'Sexy ×6',    notation: "R U R' U' R U R' U' R U R' U' R U R' U' R U R' U' R U R' U'",          caseAlg: false },
    { label: 'Sledge ×6',  notation: "R' F R F' R' F R F' R' F R F' R' F R F' R' F R F' R' F R F'",          caseAlg: false },
    { label: 'Sune',       notation: "R U R' U R U2 R'",                                                      caseAlg: true  },
    { label: 'Anti-Sune',  notation: "R U2 R' U' R U' R'",                                                    caseAlg: true  },
    { label: 'T-Perm',     notation: "R U R' U' R' F R2 U' R' U' R U R' F'",                                  caseAlg: true  },
    { label: 'Ua-Perm',    notation: "R U' R U R U R U' R' U' R2",                                            caseAlg: true  },
    { label: 'H-Perm',     notation: "M2 U M2 U2 M2 U M2",                                                    caseAlg: true  },
  ];

  // ---- State ----
  let currentAlgIndex = 0;
  let currentMoves = [];
  let stepIndex = 0;
  let isPlaying = false;
  let activeMask = null;        // orbit string or null
  let currentSetupMoves = [];   // moves from solved → currentCaseState (for instant reloads)

  // ---- Structured debug log ----
  const _stateLog = [];
  function _logEvent(type, data) {
    _stateLog.push({ seq: _stateLog.length, type, ...data });
    const link = document.getElementById('btn-download-log');
    if (link) {
      const blob = new Blob([JSON.stringify(_stateLog, null, 2)], { type: 'application/json' });
      link.href = URL.createObjectURL(blob);
    }
  }
  function _serializeVisMap(map) {
    const out = {};
    map.forEach((vis, key) => { out[key] = vis; });
    return out;
  }

  // ---- Renderer ----
  const container = document.getElementById('cube-container');
  const renderer = new CubeRenderer3D({ debug: true, animSpeed: 300 });
  renderer.mount(container);

  const renderer2d = new CubeRenderer2D(document.getElementById('cube-2d'), { size: 400 });

  // ---- Debug log ----
  const debugPre = document.getElementById('debug-pre');
  const faceStatePre = document.getElementById('face-state-pre');

  function appendLog(msg) {
    debugPre.textContent = msg + '\n' + debugPre.textContent;
  }

  window.addEventListener('cubify:log', e => appendLog(e.detail));
  appendLog('[sim] page loaded');

  const kpatternCornersPre = document.getElementById('kpattern-corners-pre');
  const kpatternEdgesPre   = document.getElementById('kpattern-edges-pre');
  const kpatternCentersPre = document.getElementById('kpattern-centers-pre');

  function showTab(tab) {
    ['log','state'].forEach(t => {
      document.getElementById(`tab-${t}`)?.classList.toggle('is-active', t === tab);
      document.getElementById(`debug-${t}-panel`)?.classList.toggle('is-active', t === tab);
    });
  }
  window.showTab = showTab;

  function showCubeTab(tab) {
    ['3d','2d'].forEach(t => {
      document.getElementById(`cube-tab-${t}`)?.classList.toggle('is-active', t === tab);
      document.getElementById(`cube-${t}-panel`)?.classList.toggle('is-active', t === tab);
    });
  }
  window.showCubeTab = showCubeTab;

  function showToolsTab(tab) {
    ['simulation','moves','stickering'].forEach(t => {
      document.getElementById(`tool-tab-${t}`)?.classList.toggle('is-active', t === tab);
      document.getElementById(`tools-${t}-panel`)?.classList.toggle('is-active', t === tab);
    });
  }
  window.showToolsTab = showToolsTab;

  const CORNER_NAMES = ['URF','URB','ULB','ULF','DRF','DLF','DLB','DRB'];
  const EDGE_NAMES   = ['UF','UR','UB','UL','DF','DR','DB','DL','FR','FL','BR','BL'];

  const CENTER_NAMES = ['U','R','F','L','B','D']; // cubing.js CENTERS orbit slot order (not URFDLB)

  function formatKPatternCorners(corners) {
    const lines = ['CORNERS  slot  piece  orient  (piece → slot)'];
    for (let i = 0; i < 8; i++) {
      const moved = corners.pieces[i] !== i || corners.orientation[i] !== 0;
      lines.push(`  [${i}]   ${corners.pieces[i]}      ${corners.orientation[i]}       ${CORNER_NAMES[corners.pieces[i]]} → ${CORNER_NAMES[i]}${moved ? ' ←' : ''}`);
    }
    return lines.join('\n');
  }

  function formatKPatternEdges(edges) {
    const lines = ['EDGES   slot  piece  orient  (piece → slot)'];
    for (let i = 0; i < 12; i++) {
      const moved = edges.pieces[i] !== i || edges.orientation[i] !== 0;
      lines.push(`  [${i.toString().padStart(2)}]  ${edges.pieces[i].toString().padStart(2)}      ${edges.orientation[i]}       ${EDGE_NAMES[edges.pieces[i]].padEnd(2)} → ${EDGE_NAMES[i]}${moved ? ' ←' : ''}`);
    }
    return lines.join('\n');
  }

  function formatKPatternCenters(centers) {
    if (!centers) return 'CENTERS  (none)';
    const lines = ['CENTERS  slot  piece  orient'];
    for (let i = 0; i < 6; i++) {
      const moved = centers.pieces[i] !== i || centers.orientation[i] !== 0;
      lines.push(`  [${i}]   ${centers.pieces[i]}      ${centers.orientation[i]}       ${CENTER_NAMES[i]}${moved ? ' ←' : ''}`);
    }
    return lines.join('\n');
  }

  function updateDebugState(state, prevFaces = null) {
    const { corners, edges, centers } = state.toRawPattern();
    faceStatePre.textContent          = state.toString();
    kpatternCornersPre.textContent    = formatKPatternCorners(corners);
    kpatternEdgesPre.textContent      = formatKPatternEdges(edges);
    kpatternCentersPre.textContent    = formatKPatternCenters(centers);
    if (prevFaces) {
      const faces = state.toFaceArray();
      const diffs = [];
      const faceNames = ['U','R','F','D','L','B'];
      for (let f = 0; f < 6; f++)
        for (let s = 0; s < 9; s++)
          if (faces[f][s] !== prevFaces[f][s])
            diffs.push(`${faceNames[f]}[${s}] ${prevFaces[f][s]}→${faces[f][s]}`);
      appendLog(`[cubify] ${diffs.length} sticker${diffs.length !== 1 ? 's' : ''} changed: ${diffs.join('  ') || '—'}`);
    }
  }

  // ---- Mask helpers ----

  // Lightweight 2D-only update after animated moves — no 3D stickering side effects.
  function update2D(state) {
    const visMap = activeMask
      ? CubeStickering.fromOrbitStringWithState(activeMask, state.toRawPattern())
      : new Map();
    renderer2d.update(state, visMap);
  }

  // After animation: restore colours (undo previous grey) then reapply active mask.
  // Does NOT move pieces — preserves the animation-derived positions and quaternions.
  function reapplyMask(state) {
    renderer.restoreColours();
    if (activeMask) {
      const raw = state.toRawPattern();
      const visMap = CubeStickering.fromOrbitStringWithState(activeMask, raw);
      renderer.applyStickering(visMap);
      renderer2d.update(state, visMap);
      const worldFaceMap = renderer.getWorldFaceMap();
      const wfObj = Object.fromEntries(worldFaceMap);
      _logEvent('reapplyMask', { activeMask, raw, visMap: _serializeVisMap(visMap), worldFaceMap: wfObj });
    } else {
      renderer2d.update(state, new Map());
      _logEvent('reapplyMask', { activeMask: null });
    }
  }

  // ---- Apply state snapshot (no animation) ----
  // Resets the visual cube to solved then instantly animates setupMoves to reach
  // the target state. Quaternions are set by the same physics as animated moves.
  function applyStateToRenderer(state, setupMoves = []) {
    _logEvent('applyStateToRenderer', { setupMoves, raw: state.toRawPattern() });
    renderer.resetToSolved();
    renderer.applyMovesInstant(setupMoves);
    reapplyMask(state);
    updateDebugState(state);
    liveState = state;
    appliedMoves = [];
    const el = document.getElementById('move-status');
    if (el) {
      const solved = state.isSolved();
      el.textContent = `Applied: (none)${solved ? '  ✓ SOLVED' : ''}`;
      el.style.color = solved ? '#7fc' : '#666';
    }
  }

  function updateStepLabel() {
    document.getElementById('move-tape').querySelectorAll('.move-chip').forEach((chip, i) => {
      chip.className = 'move-chip' +
        (i === stepIndex - 1 ? ' is-active' : i < stepIndex - 1 ? ' is-done' : '');
    });
  }

  function buildMoveTape() {
    const tape = document.getElementById('move-tape');
    tape.innerHTML = '';
    currentMoves.forEach(mv => {
      const chip = document.createElement('span');
      chip.className = 'move-chip';
      chip.textContent = mv;
      tape.appendChild(chip);
    });
  }

  let currentCaseState = _solvedBase;

  // ---- Load algorithm ----
  function loadAlg(idx) {
    stopPlay();
    currentAlgIndex = idx;
    const alg = ALGS[idx];
    currentMoves = alg.notation ? AlgParser.parse(alg.notation) : [];
    currentSetupMoves = (alg.caseAlg && currentMoves.length)
      ? ['z2', ...CubeState.invertAlg(currentMoves)]
      : [];
    currentCaseState = _solvedBase.applyAlg(currentSetupMoves);
    stepIndex = 0;
    updateAlgButtons();
    applyStateToRenderer(currentCaseState, currentSetupMoves);
    buildMoveTape();
    updateStepLabel();
    appendLog(`[sim] loaded: ${alg.label} (${currentMoves.length} moves)`);
  }

  // ---- Snap step (no animation) ----
  function snapToStep(idx) {
    stepIndex = Math.max(0, Math.min(idx, currentMoves.length));
    const stepMoves = currentMoves.slice(0, stepIndex);
    const state = _solvedBase.applyAlg([...currentSetupMoves, ...stepMoves]);
    applyStateToRenderer(state, [...currentSetupMoves, ...stepMoves]);
    updateStepLabel();
    appendLog(`[sim] step ${stepIndex}/${currentMoves.length}`);
  }

  // ---- Animated step forward ----
  function animateStepForward(onDone) {
    if (stepIndex >= currentMoves.length) { onDone?.(); return; }
    const move = currentMoves[stepIndex];
    const stateBefore = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
    const prevFaces = stateBefore.toFaceArray();
    stepIndex++;
    _logEvent('animateMove', { move, stepIndex });
    renderer.animateMove(move, () => {
      const after = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
      update2D(after);
      updateDebugState(after, prevFaces);
      updateStepLabel();
      onDone?.();
    });
  }

  // ---- Play all ----
  function startPlay() {
    if (isPlaying || currentMoves.length === 0) return;
    if (stepIndex >= currentMoves.length) {
      stepIndex = 0;
      applyStateToRenderer(currentCaseState, currentSetupMoves);
    }
    isPlaying = true;
    document.getElementById('btn-play').disabled = true;
    document.getElementById('btn-stop').disabled = false;

    const playNext = () => {
      if (!isPlaying || stepIndex >= currentMoves.length) {
        stopPlay();
        appendLog('[sim] playback complete');
        return;
      }
      animateStepForward(() => {
        if (isPlaying) setTimeout(playNext, 80);
      });
    };
    appendLog('[sim] play started');
    playNext();
  }

  function stopPlay() {
    isPlaying = false;
    document.getElementById('btn-play').disabled = false;
    document.getElementById('btn-stop').disabled = true;
  }

  // ---- Build alg buttons ----
  function updateAlgButtons() {
    document.querySelectorAll('#alg-buttons button').forEach((btn, i) => {
      btn.classList.toggle('is-active', i === currentAlgIndex);
    });
  }

  const algBtnContainer = document.getElementById('alg-buttons');
  ALGS.forEach((alg, i) => {
    const btn = document.createElement('button');
    btn.className = 'button is-harness is-small';
    btn.textContent = alg.label;
    btn.onclick = () => loadAlg(i);
    algBtnContainer.appendChild(btn);
  });

  // ---- Playback controls ----
  document.getElementById('btn-play').onclick = startPlay;
  document.getElementById('btn-stop').onclick = () => { stopPlay(); appendLog('[sim] stopped'); };

  // ---- Step controls ----
  document.getElementById('btn-prev').onclick = () => {
    stopPlay();
    if (stepIndex <= 0 || renderer.isAnimating) return;
    const lastMove = currentMoves[stepIndex - 1];
    const stateBefore = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
    const prevFaces = stateBefore.toFaceArray();
    const inverseMove = CubeState.invertAlg([lastMove])[0];
    stepIndex--;
    renderer.animateMove(inverseMove, () => {
      const state = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
      update2D(state);
      updateDebugState(state, prevFaces);
      updateStepLabel();
    });
  };
  document.getElementById('btn-next').onclick = () => {
    stopPlay();
    if (stepIndex < currentMoves.length) animateStepForward();
  };
  document.getElementById('btn-reset').onclick = () => {
    stopPlay();
    snapToStep(0);
    appendLog('[sim] reset to case state');
  };

  // ---- Camera ----
  document.getElementById('btn-cam-reset').onclick = () => {
    renderer.resetCamera();
    appendLog('[sim] camera reset');
  };

  // ---- Export ----
  const EXPORT_SIZE = 288;
  const dl = (url, name) => { const a = document.createElement('a'); a.download = name; a.href = url; a.click(); };

  document.getElementById('btn-export-2d').onclick = () => {
    const raw = currentCaseState.toRawPattern();
    const vis = activeMask ? CubeStickering.fromOrbitStringWithState(activeMask, raw) : new Map();
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width  = EXPORT_SIZE;
    tmpCanvas.height = EXPORT_SIZE;
    const tmp2d = new CubeRenderer2D(null, { size: EXPORT_SIZE, canvas: tmpCanvas, transparent: true });
    tmp2d.update(currentCaseState, vis);
    dl(tmpCanvas.toDataURL('image/png'), 'cubify-2d.png');
    appendLog(`[export] cubify-2d.png (${EXPORT_SIZE}px)`);
  };

  document.getElementById('btn-export-3d').onclick = () => {
    const gl = renderer._renderer;
    const origRatio = gl.getPixelRatio();
    const origCssW  = gl.domElement.clientWidth  || gl.domElement.width  / origRatio;
    const origCssH  = gl.domElement.clientHeight || gl.domElement.height / origRatio;
    const origBg    = renderer._scene.background;
    renderer._scene.background = null;
    gl.setPixelRatio(1);
    gl.setSize(EXPORT_SIZE, EXPORT_SIZE, false);
    gl.render(renderer._scene, renderer._camera);
    dl(gl.domElement.toDataURL('image/png'), 'cubify-3d.png');
    renderer._scene.background = origBg;
    gl.setPixelRatio(origRatio);
    gl.setSize(origCssW, origCssH, false);
    appendLog(`[export] cubify-3d.png (${EXPORT_SIZE}px)`);
  };

  // ---- Solved ----
  document.getElementById('btn-solved').onclick = () => {
    stopPlay();
    currentSetupMoves = [];
    currentMoves = [];
    stepIndex = 0;
    applyStateToRenderer(_solvedBase, []);
    updateStepLabel();
    appendLog('[sim] jumped to solved');
  };

  // ---- Speed ----
  document.querySelectorAll('[data-speed]').forEach(btn => {
    btn.onclick = () => {
      renderer.setSpeed(parseInt(btn.dataset.speed));
      document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      appendLog(`[sim] speed: ${btn.dataset.speed}ms`);
    };
  });

  // ---- Stickering tab ----
  const orbitInput  = document.getElementById('orbit-input');
  const orbitStatus = document.getElementById('orbit-status');

  MASK_PRESETS.forEach(({ group, label, str }) => {
    const btn = document.createElement('button');
    btn.className = 'button is-harness is-small';
    btn.style.fontFamily = 'monospace';
    btn.textContent = label;
    btn.title = str;
    btn.onclick = () => { orbitInput.value = str; applyOrbitString(str); };
    document.getElementById(`orbit-examples-${group}`).appendChild(btn);
  });

  function applyOrbitString(str) {
    if (!str.trim()) return;
    try {
      activeMask = str.trim();
      reapplyMask(liveState);
      const map = CubeStickering.fromOrbitStringWithState(str.trim(), liveState.toRawPattern());
      let active = 0, dimmed = 0, masked = 0;
      for (const slots of map.values()) {
        const max = Math.max(...slots);
        if (max === 2) active++;
        else if (max === 1) dimmed++;
        else masked++;
      }
      const label = MASK_PRESETS.find(p => p.str === str.trim())?.label ?? str.trim().slice(0, 40);
      orbitStatus.textContent = `Applied: ${active} active / ${dimmed} dimmed / ${masked} masked`;
      orbitStatus.style.color = '#7fc';
      appendLog(`[stickering] Applied: ${label} — ${active} active / ${dimmed} dimmed / ${masked} masked`);
    } catch (e) {
      orbitStatus.textContent = `Error: ${e.message}`;
      orbitStatus.style.color = '#f88';
    }
  }

  document.getElementById('btn-orbit-apply').onclick = () => applyOrbitString(orbitInput.value);
  orbitInput.addEventListener('keydown', e => { if (e.key === 'Enter') applyOrbitString(orbitInput.value); });

  document.getElementById('btn-orbit-clear').onclick = () => {
    activeMask = null;
    reapplyMask(liveState);
    orbitInput.value = '';
    orbitStatus.textContent = 'Cleared — all stickers visible';
    orbitStatus.style.color = '#666';
    appendLog('[stickering] Cleared — all stickers visible');
  };

  // ---- Move validator ----
  let liveState = _solvedBase;
  let appliedMoves = [];

  function setLiveState(state, movesLabel) {
    liveState = state;
    reapplyMask(state);
    updateDebugState(state);
    const solved = state.isSolved();
    document.getElementById('move-status').textContent =
      `Applied: ${movesLabel || '(none)'}${solved ? '  ✓ SOLVED' : ''}`;
    document.getElementById('move-status').style.color = solved ? '#7fc' : '#666';
  }

  const MOVE_BUTTONS_FACE  = ['U',"U'",'R',"R'",'F',"F'",'D',"D'",'L',"L'",'B',"B'"];
  const MOVE_BUTTONS_OTHER = ['M',"M'",'S',"S'",'E',"E'",'x',"x'",'y',"y'",'z',"z'"];

  function buildMoveButtons(moves, containerId) {
    const container = document.getElementById(containerId);
    moves.forEach(mv => {
      const btn = document.createElement('button');
      btn.className = 'button is-harness is-small';
      btn.style.fontFamily = 'monospace';
      btn.textContent = mv;
      btn.onclick = () => applyLiveMove(mv);
      container.appendChild(btn);
    });
  }
  buildMoveButtons(MOVE_BUTTONS_FACE,  'move-buttons-face');
  buildMoveButtons(MOVE_BUTTONS_OTHER, 'move-buttons-other');

  function applyLiveMove(mv, onDone) {
    if (renderer.isAnimating) { appendLog(`[move] skip (animating): ${mv}`); onDone?.(); return; }
    appendLog(`[move] move: ${mv}`);
    const prevFaces = liveState.toFaceArray();
    const nextState = liveState.applyMove(mv);
    appliedMoves.push(mv);
    renderer.animateMove(mv, () => {
      liveState = nextState;
      update2D(nextState);
      updateDebugState(nextState, prevFaces);
      const solved = nextState.isSolved();
      document.getElementById('move-status').textContent =
        `Applied: ${appliedMoves.join(' ')}${solved ? '  ✓ SOLVED' : ''}`;
      document.getElementById('move-status').style.color = solved ? '#7fc' : '#666';
      onDone?.();
    });
  }


  document.getElementById('btn-move-apply').onclick = () => {
    const input = document.getElementById('move-input');
    const notation = input.value.trim();
    if (!notation) return;
    const moves = AlgParser.parse(notation);
    appendLog(`[move] parsed ${moves.length} moves: ${moves.join(' ')}`);
    if (!moves.length) return;
    const endState = moves.reduce((s, m) => s.applyMove(m), liveState);
    renderer.animateAlg(moves, (idx) => {
      appendLog(`[move] move: ${moves[idx]}`);
    }, () => {
      liveState = endState;
      appliedMoves.push(...moves);
      update2D(endState);
      updateDebugState(endState);
      const solved = endState.isSolved();
      document.getElementById('move-status').textContent =
        `Applied: ${appliedMoves.join(' ')}${solved ? '  ✓ SOLVED' : ''}`;
      document.getElementById('move-status').style.color = solved ? '#7fc' : '#666';
      appendLog('[move] done');
    });
  };

  document.getElementById('btn-move-reset').onclick = () => {
    stopPlay();
    appliedMoves = [];
    renderer.resetToSolved();
    setLiveState(_solvedBase, '(none)');
    appendLog('[move] reset to solved');
  };

  // ---- Initial state: Sune selected ----
  loadAlg(2);
  showTab('log');
</script>

</body>
</html>
