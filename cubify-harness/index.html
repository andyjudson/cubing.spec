<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cubify-harness</title>
  <link rel="stylesheet" href="./css/cubify.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px 16px 196px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    h1 { font-size: 1.1rem; margin-bottom: 12px; color: #fff; flex-shrink: 0; }

    /* ---- Top area: cube + controls side by side, fills remaining space ---- */
    .top {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex: 1;
      min-height: 0;
    }

    #cube-container {
      /* Fill available height, square aspect ratio */
      height: 100%;
      aspect-ratio: 1;
      background: #0d0d1a;
      border-radius: 8px;
      border: 1px solid #333;
      overflow: hidden;
      flex-shrink: 0;
    }
    #cube-container canvas { display: block; }

    /* ---- Controls column ---- */
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 20px;
      flex: 1;
      min-width: 260px;
      align-content: start;
    }
    .control-group { display: flex; flex-direction: column; gap: 5px; }
    .control-group.full-width { grid-column: 1 / -1; }

    .control-group label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
    }
    .btn-row { display: flex; gap: 5px; flex-wrap: wrap; }

    button {
      padding: 5px 11px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #ddd;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #2a2a2a; }
    button.active { background: #2d5af5; border-color: #2d5af5; color: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }

    .alg-label {
      font-size: 0.75rem;
      color: #aaa;
      font-family: monospace;
      min-height: 1.1em;
    }

    /* ---- Debug panel — fixed to bottom, fixed height ---- */
    .debug-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: #0d0d1a;
      border-top: 1px solid #333;
      padding: 8px 16px 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    .debug-panel h3 { flex-shrink: 0; }
    .debug-tabs { flex-shrink: 0; }
    .validator-row { flex-shrink: 0; }
    .validator-input-row { flex-shrink: 0; }
    #move-status { flex-shrink: 0; }
    #tab-validator-panel { overflow-y: auto; flex: 1; }
    #debug-pre, #face-state-pre, #kpattern-pre {
      flex: 1; overflow-y: auto; max-height: none;
    }
    .debug-panel h3 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 8px;
    }
    .debug-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .debug-tabs button { font-size: 0.72rem; padding: 3px 9px; }

    /* Move validator inside debug panel */
    .validator-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px;
    }
    .validator-row button { font-family: monospace; min-width: 36px; text-align: center; }
    .validator-input-row { display: flex; gap: 6px; margin-bottom: 6px; }
    #move-input {
      flex: 1; padding: 5px 9px; border-radius: 4px; border: 1px solid #444;
      background: #111827; color: #ddd; font-family: monospace; font-size: 0.85rem;
    }
    #move-status { font-size: 0.75rem; font-family: monospace; color: #aaa; margin-bottom: 8px; }

    #debug-pre {
      font-family: monospace; font-size: 0.75rem; color: #7fc;
      white-space: pre-wrap; max-height: 180px; overflow-y: auto; line-height: 1.5;
    }
    #face-state-pre {
      font-family: monospace; font-size: 0.82rem; color: #adf;
      white-space: pre; line-height: 1.6;
    }
    #kpattern-pre {
      font-family: monospace; font-size: 0.75rem; color: #fc9;
      white-space: pre; line-height: 1.5;
    }
  </style>
</head>
<body>

<h1>cubify-harness</h1>

<div class="top">

  <!-- Cube viewport — no explicit height (PoC proof: aspect-ratio only) -->
  <div id="cube-container"></div>

  <div class="controls">

    <div class="control-group full-width">
      <label>Algorithm</label>
      <div class="btn-row" id="alg-buttons"></div>
      <div class="alg-label" id="alg-label"></div>
    </div>


    <div class="control-group">
      <label>Playback</label>
      <div class="btn-row">
        <button id="btn-play">▶ Play</button>
        <button id="btn-stop" disabled>■ Stop</button>
      </div>
    </div>

    <div class="control-group">
      <label>Speed</label>
      <div class="btn-row">
        <button data-speed="500">Slow</button>
        <button class="active" data-speed="300">Normal</button>
        <button data-speed="120">Fast</button>
      </div>
    </div>

    <div class="control-group">
      <label>Step through moves</label>
      <div class="btn-row">
        <button id="btn-prev">← Prev</button>
        <button id="btn-next">Next →</button>
      </div>
      <div class="alg-label" id="step-label">—</div>
    </div>

    <div class="control-group">
      <label>Reset</label>
      <div class="btn-row">
        <button id="btn-reset">Reset case</button>
        <button id="btn-solved">Solved</button>
        <button id="btn-cam-reset">Reset view</button>
      </div>
    </div>

  </div>
</div>

<!-- Debug panel (includes move validator) -->
<div class="debug-panel">
  <h3>Debug</h3>
  <div class="debug-tabs">
    <button id="tab-log" class="active" onclick="showTab('log')">Event log</button>
    <button id="tab-validator" onclick="showTab('validator')">Move validator</button>
    <button id="tab-faces" onclick="showTab('faces')">Face state</button>
    <button id="tab-kpattern" onclick="showTab('kpattern')">KPattern</button>
  </div>

  <!-- Move validator tab -->
  <div id="tab-validator-panel" style="display:none">
    <div class="validator-row" id="move-buttons"></div>
    <div class="validator-input-row">
      <input id="move-input" type="text" placeholder="e.g. R U R' U' or Sune notation" />
      <button id="btn-move-apply">Apply</button>
      <button id="btn-move-reset">Reset to solved</button>
    </div>
    <div id="move-status" style="font-size:0.72rem;font-family:monospace;color:#555;min-height:1em;"></div>
  </div>

  <pre id="debug-pre"></pre>
  <pre id="face-state-pre" style="display:none"></pre>
  <pre id="kpattern-pre" style="display:none"></pre>
</div>

<script type="module">
  import { CubeState } from './src/CubeState.js';
  import { AlgParser } from './src/AlgParser.js';
  import { CubeRenderer3D } from './src/CubeRenderer3D.js';

  // Warm up kpuzzle early (cached after first call)
  const _solvedBase = await CubeState.solved();

  // ---- Named algorithms ----
  // caseAlg: true  → start from case state (inverse alg applied to solved), stepping solves it
  // caseAlg: false → start from solved, stepping executes the alg
  const ALGS = [
    { label: 'Sune',    notation: "R U R' U R U2 R'",                                                         caseAlg: true  },
    { label: 'T-Perm',  notation: "R U R' U' R' F R2 U' R' U' R U R' F'",                                    caseAlg: true  },
    { label: 'Ua-Perm', notation: "R U' R U R U R U' R' U' R2",                                              caseAlg: true  },
    { label: 'H-Perm',  notation: "M2 U M2 U2 M2 U M2",                                                      caseAlg: true  },
    { label: 'Sexy ×6',        notation: "R U R' U' R U R' U' R U R' U' R U R' U' R U R' U' R U R' U'",                                                                                                    caseAlg: false },
    { label: 'Sledge ×6',     notation: "R' F R F' R' F R F' R' F R F' R' F R F' R' F R F' R' F R F'",                                                                                              caseAlg: false },
  ];


  // ---- State ----
  let currentAlgIndex = 0;
  let currentMoves = [];
  let stepIndex = 0;
  let isPlaying = false;

  // ---- Renderer ----
  const container = document.getElementById('cube-container');
  const renderer = new CubeRenderer3D({ debug: true, animSpeed: 300 });
  renderer.mount(container);

  // ---- Debug log ----
  const debugPre = document.getElementById('debug-pre');
  const faceStatePre = document.getElementById('face-state-pre');

  function appendLog(msg) {
    debugPre.textContent = msg + '\n' + debugPre.textContent;
  }

  window.addEventListener('cubify:log', e => appendLog(e.detail));
  appendLog('[demo] page loaded');

  const kpatternPre = document.getElementById('kpattern-pre');

  function showTab(tab) {
    ['validator','log','faces','kpattern'].forEach(t => {
      document.getElementById(`tab-${t}`)?.classList.toggle('active', t === tab);
    });
    document.getElementById('tab-validator-panel').style.display = tab === 'validator' ? '' : 'none';
    debugPre.style.display     = tab === 'log'      ? '' : 'none';
    faceStatePre.style.display = tab === 'faces'    ? '' : 'none';
    kpatternPre.style.display  = tab === 'kpattern' ? '' : 'none';
  }
  window.showTab = showTab;

  const CORNER_NAMES = ['URF','URB','ULB','ULF','DRF','DLF','DLB','DRB'];
  const EDGE_NAMES   = ['UF','UR','UB','UL','DF','DR','DB','DL','FR','FL','BR','BL'];

  function formatKPattern(state) {
    const { corners, edges } = state.toRawPattern();
    const lines = ['CORNERS  slot  piece  orient  (piece name → slot name)'];
    for (let i = 0; i < 8; i++) {
      const moved = corners.pieces[i] !== i || corners.orientation[i] !== 0;
      const flag  = moved ? ' ←' : '';
      lines.push(`         [${i}]   ${corners.pieces[i]}      ${corners.orientation[i]}       ${CORNER_NAMES[corners.pieces[i]]} → ${CORNER_NAMES[i]}${flag}`);
    }
    lines.push('');
    lines.push('EDGES    slot  piece  orient  (piece name → slot name)');
    for (let i = 0; i < 12; i++) {
      const moved = edges.pieces[i] !== i || edges.orientation[i] !== 0;
      const flag  = moved ? ' ←' : '';
      lines.push(`         [${i.toString().padStart(2)}]  ${edges.pieces[i].toString().padStart(2)}      ${edges.orientation[i]}       ${EDGE_NAMES[edges.pieces[i]].padEnd(2)} → ${EDGE_NAMES[i]}${flag}`);
    }
    return lines.join('\n');
  }

  function updateDebugState(state, prevFaces = null) {
    faceStatePre.textContent = state.toString();
    kpatternPre.textContent  = formatKPattern(state);
    if (prevFaces) {
      const faces = state.toFaceArray();
      const diffs = [];
      const faceNames = ['U','R','F','D','L','B'];
      for (let f = 0; f < 6; f++)
        for (let s = 0; s < 9; s++)
          if (faces[f][s] !== prevFaces[f][s])
            diffs.push(`${faceNames[f]}[${s}] ${prevFaces[f][s]}→${faces[f][s]}`);
      appendLog(`[step] ${diffs.length} sticker${diffs.length !== 1 ? 's' : ''} changed: ${diffs.join('  ') || '—'}`);
    }
  }

  // ---- Apply state snapshot (no animation) ----
  function applyStateToRenderer(state) {
    renderer.setState(state);
    updateDebugState(state);
    // Keep move-validator in sync
    liveState = state;
    appliedMoves = [];
    if (typeof document !== 'undefined') {
      const el = document.getElementById('move-status');
      if (el) {
        const solved = state.isSolved();
        el.textContent = `Applied: (none)${solved ? '  ✓ SOLVED' : ''}`;
        el.style.color = solved ? '#7fc' : '#aaa';
      }
    }
  }

  function updateStepLabel() {
    const total = currentMoves.length;
    if (total === 0) { document.getElementById('step-label').textContent = '(no moves)'; return; }
    const move = currentMoves[stepIndex - 1] ?? '—';
    document.getElementById('step-label').textContent = `Step ${stepIndex}/${total} — last: ${move}`;
  }

  // Case state = solved with inverse alg applied. Step 0 shows the case;
  // stepping forward applies each move of the alg, ending at solved.
  let currentCaseState = _solvedBase;

  // ---- Load algorithm ----
  function loadAlg(idx) {
    stopPlay();
    currentAlgIndex = idx;
    const alg = ALGS[idx];
    currentMoves = alg.notation ? AlgParser.parse(alg.notation) : [];
    currentCaseState = (alg.caseAlg && currentMoves.length)
      ? _solvedBase.applyAlg(CubeState.invertAlg(currentMoves))
      : _solvedBase;
    stepIndex = 0;
    document.getElementById('alg-label').textContent = alg.notation || '(solved)';
    updateAlgButtons();
    applyStateToRenderer(currentCaseState);
    updateStepLabel();
    appendLog(`[demo] loaded: ${alg.label} (${currentMoves.length} moves)`);
  }

  // ---- Snap step (no animation) ----
  function snapToStep(idx) {
    stepIndex = Math.max(0, Math.min(idx, currentMoves.length));
    const state = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
    applyStateToRenderer(state);
    updateStepLabel();
    appendLog(`[demo] step ${stepIndex}/${currentMoves.length}`);
  }

  // ---- Animated step forward ----
  function animateStepForward(onDone) {
    if (stepIndex >= currentMoves.length) { onDone?.(); return; }
    const move = currentMoves[stepIndex];
    const prevFaces = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex)).toFaceArray();
    stepIndex++;
    renderer.animateMove(move, () => {
      const after = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
      updateDebugState(after, prevFaces);
      updateStepLabel();
      onDone?.();
    });
  }

  // ---- Play all ----
  function startPlay() {
    if (isPlaying || currentMoves.length === 0) return;
    // If at end, reset first
    if (stepIndex >= currentMoves.length) {
      stepIndex = 0;
      applyStateToRenderer(currentCaseState);
    }
    isPlaying = true;
    document.getElementById('btn-play').disabled = true;
    document.getElementById('btn-stop').disabled = false;

    const playNext = () => {
      if (!isPlaying || stepIndex >= currentMoves.length) {
        stopPlay();
        appendLog('[demo] playback complete');
        return;
      }
      animateStepForward(() => {
        if (isPlaying) setTimeout(playNext, 80);
      });
    };
    appendLog('[demo] play started');
    playNext();
  }

  function stopPlay() {
    isPlaying = false;
    document.getElementById('btn-play').disabled = false;
    document.getElementById('btn-stop').disabled = true;
  }

  // ---- Build alg buttons ----
  function updateAlgButtons() {
    document.querySelectorAll('#alg-buttons button').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentAlgIndex);
    });
  }

  const algBtnContainer = document.getElementById('alg-buttons');
  ALGS.forEach((alg, i) => {
    const btn = document.createElement('button');
    btn.textContent = alg.label;
    btn.onclick = () => loadAlg(i);
    algBtnContainer.appendChild(btn);
  });


  // ---- Playback controls ----
  document.getElementById('btn-play').onclick = startPlay;
  document.getElementById('btn-stop').onclick = () => { stopPlay(); appendLog('[demo] stopped'); };

  // ---- Step controls ----
  document.getElementById('btn-prev').onclick = () => {
    stopPlay();
    if (stepIndex <= 0 || renderer._animating) return;
    const lastMove = currentMoves[stepIndex - 1];
    const prevFaces = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex)).toFaceArray();
    const inverseMove = CubeState.invertAlg([lastMove])[0];
    stepIndex--;
    renderer.animateMove(inverseMove, () => {
      const state = currentCaseState.applyAlg(currentMoves.slice(0, stepIndex));
      updateDebugState(state, prevFaces);
      updateStepLabel();
    });
  };
  document.getElementById('btn-next').onclick = () => {
    stopPlay();
    if (stepIndex < currentMoves.length) animateStepForward();
  };
  document.getElementById('btn-reset').onclick = () => {
    stopPlay();
    snapToStep(0);
    appendLog('[demo] reset to case state');
  };

  // ---- Camera ----
  document.getElementById('btn-cam-reset').onclick = () => {
    renderer.resetCamera();
    appendLog('[demo] camera reset');
  };

  // ---- Solved ----
  document.getElementById('btn-solved').onclick = () => {
    stopPlay();
    applyStateToRenderer(_solvedBase);
    currentMoves = [];
    stepIndex = 0;
    updateStepLabel();
    appendLog('[demo] jumped to solved');
  };

  // ---- Speed ----
  document.querySelectorAll('[data-speed]').forEach(btn => {
    btn.onclick = () => {
      renderer._animSpeed = parseInt(btn.dataset.speed);
      document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      appendLog(`[demo] speed: ${btn.dataset.speed}ms`);
    };
  });

  // ---- Move validator ----
  // Tracks the live visual state independently so we can apply one move at a time.
  let liveState = _solvedBase;
  let appliedMoves = [];

  function setLiveState(state, movesLabel) {
    liveState = state;
    renderer.setState(state);
    updateDebugState(state);
    const solved = state.isSolved();
    document.getElementById('move-status').textContent =
      `Applied: ${movesLabel || '(none)'}${solved ? '  ✓ SOLVED' : ''}`;
    document.getElementById('move-status').style.color = solved ? '#7fc' : '#aaa';
  }

  // Build 18-move button grid (U R F D L B × normal/prime/double)
  const MOVE_BUTTONS = [
    'U',"U'",
    'R',"R'",
    'F',"F'",
    'D',"D'",
    'L',"L'",
    'B',"B'",
    'M',"M'",
  ];
  const moveBtnContainer = document.getElementById('move-buttons');
  MOVE_BUTTONS.forEach(mv => {
    const btn = document.createElement('button');
    btn.textContent = mv;
    btn.style.fontFamily = 'monospace';
    btn.style.minWidth = '40px';
    btn.onclick = () => applyLiveMove(mv);
    moveBtnContainer.appendChild(btn);
  });

  function applyLiveMove(mv, onDone) {
    if (renderer._animating) { appendLog(`[validator] skip (animating): ${mv}`); onDone?.(); return; }
    appendLog(`[validator] move: ${mv}`);
    const prevFaces = liveState.toFaceArray();
    const nextState = liveState.applyMove(mv);
    appliedMoves.push(mv);
    renderer.animateMove(mv, () => {
      liveState = nextState;
      updateDebugState(nextState, prevFaces);
      const solved = nextState.isSolved();
      document.getElementById('move-status').textContent =
        `Applied: ${appliedMoves.join(' ')}${solved ? '  ✓ SOLVED' : ''}`;
      document.getElementById('move-status').style.color = solved ? '#7fc' : '#aaa';
      onDone?.();
    });
  }

  document.getElementById('btn-move-apply').onclick = () => {
    const input = document.getElementById('move-input');
    const notation = input.value.trim();
    if (!notation) return;
    const moves = AlgParser.parse(notation);
    appendLog(`[validator] parsed ${moves.length} moves: ${moves.join(' ')}`);
    if (!moves.length) return;
    // Compute the full end state upfront
    const endState = moves.reduce((s, m) => s.applyMove(m), liveState);
    // Use renderer.animateAlg — same path as Play, known to work
    renderer.animateAlg(moves, (idx) => {
      appendLog(`[validator] move: ${moves[idx]}`);
    }, () => {
      liveState = endState;
      appliedMoves.push(...moves);
      updateDebugState(endState);
      const solved = endState.isSolved();
      document.getElementById('move-status').textContent =
        `Applied: ${appliedMoves.join(' ')}${solved ? '  ✓ SOLVED' : ''}`;
      document.getElementById('move-status').style.color = solved ? '#7fc' : '#aaa';
      appendLog('[validator] done');
    });
  };

  document.getElementById('btn-move-reset').onclick = () => {
    stopPlay();
    appliedMoves = [];
    setLiveState(_solvedBase, '(none)');
    appendLog('[validator] reset to solved');
  };

  // ---- Initial load ----
  loadAlg(0); // Sune by default
  showTab('log');
</script>

</body>
</html>
